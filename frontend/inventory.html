<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory — Monika G Cafe</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body class="app-body">
<nav class="nav-bar"><div id="nav-root"></div></nav>
<div class="page-content">
  <div class="page-header-actions">
    <div><h1>Inventory</h1><p>Track stock and manage restocking.</p></div>
    <button class="btn btn-primary" onclick="openInventoryModal()">+ Add Item</button>
  </div>
  <div class="section-toolbar">
    <label class="flex items-center gap-2" style="font-size:0.88rem">
      <input type="checkbox" id="low-stock-toggle" onchange="loadInventory()"> Low stock only
    </label>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Item</th><th>Stock</th><th>Reorder Level</th><th>Cost</th><th>Status</th><th></th></tr></thead>
      <tbody id="inventory-body"><tr><td colspan="6" class="empty-state">Loading…</td></tr></tbody>
    </table>
  </div>
</div>
<div class="modal-backdrop hidden" id="inventory-modal">
  <div class="modal-card">
    <h3>Add Stock Item</h3>
    <div class="flex-col gap-3">
      <div class="field"><label for="inv-name">Name</label><input type="text" id="inv-name" placeholder="Coffee Beans"></div>
      <div class="field"><label for="inv-unit">Unit</label><input type="text" id="inv-unit" placeholder="kg, ltr, pcs"></div>
      <div class="field"><label for="inv-qty">Quantity</label><input type="number" id="inv-qty" value="0" step="0.1"></div>
      <div class="field"><label for="inv-reorder">Reorder Level</label><input type="number" id="inv-reorder" value="5" step="0.1"></div>
      <div class="field"><label for="inv-cost">Cost per Unit (₹)</label><input type="number" id="inv-cost" value="0" step="0.1"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeInventoryModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveInventoryItem()">Save</button>
    </div>
  </div>
</div>
<div class="modal-backdrop hidden" id="restock-modal">
  <div class="modal-card">
    <h3>Adjust Stock</h3>
    <input type="hidden" id="restock-item-id">
    <div class="flex-col gap-3">
      <div class="field"><label for="restock-amount">Change Amount</label><input type="number" id="restock-amount" step="0.1" placeholder="10 to add, -2 to remove"></div>
      <div class="field"><label for="restock-reason">Reason</label><input type="text" id="restock-reason" placeholder="Weekly restock" value="manual restock"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeRestockModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitRestock()">Apply</button>
    </div>
  </div>
</div>
<div id="toast-root"></div>
<script src="js/api.js"></script>
<script src="js/helpers.js"></script>
<script src="js/inventory.js"></script>
</body>
</html>
