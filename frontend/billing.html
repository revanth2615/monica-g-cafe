<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billing — Monika G Cafe</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body class="app-body">
<nav class="nav-bar"><div id="nav-root"></div></nav>
<div class="page-content">
  <div class="page-header-actions">
    <div><h1>Billing</h1><p>Generate and track payments.</p></div>
    <button class="btn btn-primary" onclick="openGenerateBillModal()">+ Generate Bill</button>
  </div>
  <div class="section-toolbar">
    <label class="flex items-center gap-2" style="font-size:0.88rem">
      <input type="checkbox" id="unpaid-only-toggle" onchange="loadBills()"> Show unpaid only
    </label>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>#</th><th>Order</th><th>Subtotal</th><th>Tax</th><th>Discount</th><th>Total</th><th>Status</th><th></th></tr></thead>
      <tbody id="bills-body"><tr><td colspan="8" class="empty-state">Loading…</td></tr></tbody>
    </table>
  </div>
</div>
<div class="modal-backdrop hidden" id="bill-modal">
  <div class="modal-card">
    <h3>Generate Bill</h3>
    <div class="flex-col gap-3">
      <div class="field"><label for="bill-order-id">Order ID</label><input type="number" id="bill-order-id" placeholder="14"></div>
      <div class="field"><label for="bill-tax">Tax %</label><input type="number" id="bill-tax" value="5" step="0.5"></div>
      <div class="field"><label for="bill-discount">Discount (₹)</label><input type="number" id="bill-discount" value="0" step="1"></div>
      <div class="field"><label for="bill-payment-method">Payment</label><select id="bill-payment-method"><option value="cash">Cash</option><option value="card">Card</option><option value="upi">UPI</option></select></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeGenerateBillModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitGenerateBill()">Generate</button>
    </div>
  </div>
</div>
<div id="toast-root"></div>
<script src="js/api.js"></script>
<script src="js/helpers.js"></script>
<script src="js/billing.js"></script>
</body>
</html>
