<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Management — Monika G Cafe</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body class="app-body">

<nav class="nav-bar"><div id="nav-root"></div></nav>

<div class="page-content">
  <div class="page-header-actions">
    <div>
      <h1>Menu</h1>
      <p>Create, edit, and manage café menu items.</p>
    </div>
    <button class="btn btn-primary" onclick="openItemModal()">+ Add Item</button>
  </div>

  <div id="menu-grid" class="menu-grid">
    <div class="empty-state">Loading menu…</div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-backdrop hidden" id="item-modal">
  <div class="modal-card">
    <h3 id="modal-title">Add Menu Item</h3>
    <div class="flex-col gap-3">
      <input type="hidden" id="item-id">
      <div class="field">
        <label for="item-name">Item Name</label>
        <input type="text" id="item-name" placeholder="e.g. Espresso">
      </div>
      <div class="field">
        <label for="item-desc">Description</label>
        <input type="text" id="item-desc" placeholder="Short description">
      </div>
      <div class="field">
        <label for="item-price">Price (₹)</label>
        <input type="number" id="item-price" min="0" step="0.01">
      </div>
      <div class="field">
        <label for="item-category">Category</label>
        <select id="item-category"></select>
      </div>
      <label class="flex items-center gap-2" style="font-size:0.88rem; margin-top:4px">
        <input type="checkbox" id="item-available" checked> Available to order
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeItemModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveMenuItem()">Save Item</button>
    </div>
  </div>
</div>

<div id="toast-root"></div>
<script src="js/api.js"></script>
<script src="js/helpers.js"></script>
<script src="js/menu.js"></script>
</body>
</html>
